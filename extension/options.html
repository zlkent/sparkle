<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sparkle 扩展设置</title>
    <style>
      :root {
        --bg0: #0b1020;
        --bg1: #0c1630;
        --card: rgba(17, 26, 46, 0.78);
        --card2: rgba(10, 14, 26, 0.55);
        --text: #e9effa;
        --muted: #a7b7d7;
        --border: rgba(255, 255, 255, 0.09);
        --primary: #2563eb;
        --danger: #fb7185;
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }
      body {
        margin: 0;
        background: radial-gradient(120% 120% at 0% 0%, #1b2a52 0%, var(--bg0) 38%, var(--bg1) 100%);
        color: var(--text);
        font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 18px 18px 28px;
      }
      .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 22px;
        height: 22px;
        border-radius: 7px;
        background: linear-gradient(135deg, rgba(52, 211, 153, 0.95), rgba(37, 99, 235, 0.95));
        box-shadow: 0 10px 30px rgba(37, 99, 235, 0.28);
      }
      h2 {
        margin: 0;
        font-weight: 900;
        letter-spacing: 0.2px;
      }
      .subtitle {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      label {
        display: block;
        color: var(--muted);
        margin: 10px 0 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        outline: none;
      }
      input:focus {
        border-color: rgba(37, 99, 235, 0.7);
      }
      .row2 {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono',
          'Courier New', monospace;
      }
      .switchRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 10px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        margin-top: 10px;
      }
      .switchRow .left {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .switchRow .t {
        font-weight: 800;
      }
      .switchRow .d {
        color: var(--muted);
        font-size: 12px;
      }
      .toggle {
        width: 44px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        position: relative;
        cursor: pointer;
        flex: 0 0 auto;
      }
      .toggle::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 3px;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        transition: transform 120ms ease;
      }
      .toggle.on {
        background: rgba(37, 99, 235, 0.32);
        border-color: rgba(37, 99, 235, 0.55);
      }
      .toggle.on::after {
        transform: translateX(18px);
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 800;
      }
      .primary {
        background: rgba(37, 99, 235, 0.9);
        border-color: rgba(37, 99, 235, 0.9);
        color: #fff;
      }
      .secondary {
        background: rgba(0, 0, 0, 0.12);
      }
      .danger {
        background: rgba(251, 113, 133, 0.18);
        border-color: rgba(251, 113, 133, 0.35);
        color: #ffd1da;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.09);
      }
      button.primary:hover {
        background: rgba(37, 99, 235, 0.95);
      }
      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }
      .status {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }
      code {
        background: rgba(255, 255, 255, 0.06);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h2>Sparkle 扩展设置</h2>
            <div class="subtitle">用于读取 Sparkle 的本地只读扩展 API（127.0.0.1）</div>
          </div>
        </div>
        <div class="row2">
          <span class="mono" style="color: var(--muted); font-size: 12px">ID:</span>
          <span id="extId" class="mono" style="font-size: 12px">—</span>
          <button id="copyOrigin" class="secondary">复制 Origin</button>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <label for="baseUrl">Extension API Base URL</label>
          <input id="baseUrl" class="mono" placeholder="http://127.0.0.1:14123" />

          <label for="token">Bearer Token</label>
          <input id="token" class="mono" placeholder="从 Sparkle → 设置 → 更多设置 → 浏览器扩展 API 复制" />

          <div class="row">
            <button id="save" class="primary">保存</button>
            <button id="reset" class="secondary">重置</button>
            <button id="test" class="secondary">测试连接</button>
          </div>

          <div class="hint">
            请求：<code>GET /ext/v1/connection?url=...</code>，并携带
            <code>Authorization: Bearer &lt;token&gt;</code>
          </div>
          <div id="status" class="status"></div>
        </div>

        <div class="card">
          <div class="switchRow">
            <div class="left">
              <div class="t">预拉取（后台）</div>
              <div class="d">切换/刷新标签页时自动查询并缓存</div>
            </div>
            <div id="prefetchToggle" class="toggle"></div>
          </div>

          <div class="switchRow">
            <div class="left">
              <div class="t">图标角标</div>
              <div class="d">P=代理，D=直连，?=未命中，ERR=错误</div>
            </div>
            <div id="badgeToggle" class="toggle"></div>
          </div>

          <label for="staleMs">“数据过期”提示阈值（毫秒）</label>
          <input id="staleMs" class="mono" type="number" min="0" step="1000" placeholder="5000" />

          <div class="hint">
            建议在 Sparkle 里配置允许的 Origin：<code id="originText">chrome-extension://&lt;id&gt;</code>
            <br />
            这样就算本机有其他网页尝试探测，也会被挡掉。
          </div>
        </div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
