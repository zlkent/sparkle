<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sparkle Options</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: #111a2e;
        --text: #e6edf7;
        --muted: #9fb0cc;
        --border: rgba(255, 255, 255, 0.08);
        --btn: #2563eb;
        --btn2: #1f2937;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 18px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }
      label {
        display: block;
        color: var(--muted);
        margin: 10px 0 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        outline: none;
      }
      input:focus {
        border-color: rgba(37, 99, 235, 0.7);
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      button {
        border: 0;
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
      }
      .primary {
        background: var(--btn);
        color: white;
      }
      .secondary {
        background: var(--btn2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }
      .status {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }
      code {
        background: rgba(255, 255, 255, 0.06);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2 style="margin: 0 0 12px">Sparkle Options</h2>
      <div class="card">
        <label for="baseUrl">Extension API Base URL</label>
        <input id="baseUrl" placeholder="http://127.0.0.1:14123" />

        <label for="token">Bearer Token</label>
        <input id="token" placeholder="Paste token from Sparkle config" />

        <div class="row">
          <button id="save" class="primary">Save</button>
          <button id="reset" class="secondary">Reset</button>
        </div>

        <div class="hint">
          Endpoint used: <code>GET /ext/v1/connection?url=...</code> with
          <code>Authorization: Bearer &lt;token&gt;</code>
        </div>
        <div id="status" class="status"></div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
