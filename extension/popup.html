<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sparkle</title>
    <style>
      :root {
        --bg0: #0b1020;
        --bg1: #0c1630;
        --card: rgba(17, 26, 46, 0.78);
        --card2: rgba(10, 14, 26, 0.55);
        --text: #e9effa;
        --muted: #a7b7d7;
        --green: #34d399;
        --gray: #94a3b8;
        --yellow: #fbbf24;
        --red: #fb7185;
        --border: rgba(255, 255, 255, 0.09);
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }
      body {
        margin: 0;
        width: 360px;
        background: radial-gradient(120% 120% at 0% 0%, #1b2a52 0%, var(--bg0) 38%, var(--bg1) 100%);
        color: var(--text);
        font: 13px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .wrap {
        padding: 12px 12px 14px;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        background: linear-gradient(135deg, rgba(52, 211, 153, 0.95), rgba(37, 99, 235, 0.95));
        box-shadow: 0 10px 30px rgba(37, 99, 235, 0.28);
      }
      .title {
        font-weight: 800;
        letter-spacing: 0.2px;
        line-height: 1.1;
      }
      .sub {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      a {
        color: var(--muted);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }
      .headerRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button {
        appearance: none;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 10px;
        padding: 6px 10px;
        cursor: pointer;
        font-weight: 700;
        font-size: 12px;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.09);
      }
      button:active {
        transform: translateY(1px);
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin: 8px 0;
      }
      .k {
        color: var(--muted);
        min-width: 84px;
      }
      .v {
        text-align: right;
        word-break: break-word;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-weight: 800;
        background: rgba(0, 0, 0, 0.15);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 99px;
        display: inline-block;
      }
      .dot.green {
        background: var(--green);
      }
      .dot.gray {
        background: var(--gray);
      }
      .dot.yellow {
        background: var(--yellow);
      }
      .dot.red {
        background: var(--red);
      }
      .muted {
        color: var(--muted);
      }
      .chips {
        display: flex;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 6px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        font-size: 12px;
        max-width: 240px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono',
          'Courier New', monospace;
      }
      .hint {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
      }
      .error {
        margin-top: 8px;
        color: var(--red);
        white-space: pre-wrap;
      }
      .small {
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <div class="title">Sparkle</div>
            <div class="sub">代理命中 / 规则 / 链路</div>
          </div>
        </div>
        <a id="openOptions" href="#">设置</a>
      </div>

      <div class="card">
        <div class="headerRow">
          <div class="v">
            <span id="status" class="badge"><span class="dot gray"></span>加载中…</span>
          </div>
          <div class="actions">
            <button id="refresh">刷新</button>
          </div>
        </div>
        <div class="row">
          <div class="k">Host</div>
          <div id="host" class="v muted mono">—</div>
        </div>
        <div class="row">
          <div class="k">链路</div>
          <div id="chain" class="v muted">—</div>
        </div>
        <div class="row">
          <div class="k">规则</div>
          <div id="rule" class="v muted">—</div>
        </div>
        <div class="row">
          <div class="k">更新时间</div>
          <div id="ts" class="v muted">—</div>
        </div>
        <div id="error" class="error small"></div>
        <div id="hint" class="hint" style="display: none"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
